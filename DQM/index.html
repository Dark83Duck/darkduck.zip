<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>던전 퀴즈 마스터</title>
  
  <!-- Tailwind CSS & Lucide Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- QR 코드 생성 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <!-- 고전 게임 느낌을 위한 레트로 폰트 (둥근모꼴) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css">

  <style>
    body { font-family: 'NeoDunggeunmo', sans-serif; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    
    /* 몬스터 숨쉬기 애니메이션 */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .animate-float { animation: float 2s ease-in-out infinite; }
    
    /* 피격 시 흔들림 애니메이션 */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px) rotate(-5deg); }
      75% { transform: translateX(5px) rotate(5deg); }
    }
    .animate-shake { animation: shake 0.3s ease-in-out; }

    /* 레트로 대화창 스타일 */
    .retro-box {
      border: 4px solid #fff;
      box-shadow: 4px 4px 0px #000;
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

  <div id="app" class="min-h-screen flex flex-col items-center justify-center p-4">
    <h2 class="text-xl text-slate-400">마법진을 그리는 중...</h2>
  </div>

  <script>
    // --- [중요] 데이터 초기화 ---
    const rawAppUrl = "<?= appUrl ?>";
    const rawSheetId = "<?= sheetId ?>";

    // 몬스터 30종과 대응하는 아이콘 설정
    const MONSTERS = [
      '슬라임', '고블린', '스켈레톤', '오크', '미노타우로스', 
      '다크나이트', '드래곤', '거대박쥐', '늑대인간', '좀비', 
      '뱀파이어', '서큐버스', '돌골렘', '가고일', '트롤', 
      '코볼트', '리치', '베히모스', '크라켄', '켈베로스', 
      '하피', '듀라한', '바실리스크', '그리폰', '만티코어', 
      '사이클롭스', '원혼', '밴시', '미믹', '마왕'
    ];
    
    // 외부 이미지를 끌어오면 로딩 속도 저하나 링크 끊김 문제가 발생할 수 있어, 
    // 기기에 내장된 고품질 컬러 그래픽인 '이모지'를 거대하게 키워 몬스터 스크라이트처럼 활용합니다.
    const MONSTER_EMOJIS = [
      '🦠', '👺', '💀', '👹', '🐂', 
      '🥷', '🐉', '🦇', '🐺', '🧟', 
      '🧛', '😈', '🪨', '🗿', '🧌', 
      '🦎', '☠️', '🦖', '🦑', '🐕‍🦺', 
      '🦅', '🎃', '🐍', '🪽', '🦁', 
      '👁️', '👻', '😱', '📦', '👿'
    ];

    const state = {
      appState: 'setup', 
      sheetId: '',
      questions: [],
      currentQuestionIndex: 0,
      score: 0,
      selectedAnswer: null,
      isAnswerChecked: false,
      errorMessage: '',
      timeoutId: null,
      qrUrl: '', // QR 코드를 띄울 URL 상태 추가
      
      hp: 3,
      maxHp: 3,
      level: 1,
      exp: 0,
      logs: [],
      shakeScreen: false,
      monsterHit: false
    };

    function addLog(message) {
      state.logs.push(message);
      if (state.logs.length > 3) state.logs.shift(); 
    }

    function extractSheetId(input) {
      if (!input) return '';
      const match = input.match(/\/d\/([a-zA-Z0-9-_]+)/);
      return match ? match[1] : input.trim();
    }

    window.onload = () => {
      try {
        let initialId = '';
        
        const params = new URLSearchParams(window.location.search);
        const urlId = params.get('sheetId');
        
        if (urlId) {
          initialId = urlId;
        } else if (rawSheetId && !rawSheetId.includes("<?")) {
          initialId = rawSheetId;
        }

        if (initialId) {
          state.sheetId = extractSheetId(initialId);
          fetchQuizData(state.sheetId);
        } else {
          render(); 
        }
      } catch (error) {
        document.getElementById('app').innerHTML = `
          <div class="retro-box bg-red-900 p-8 max-w-md text-center">
            <h2 class="text-2xl text-yellow-300 mb-4">초기화 오류!</h2>
            <p>${error.message}</p>
          </div>
        `;
      }
    };

    function fetchQuizData(id) {
      state.appState = 'loading';
      state.errorMessage = '';
      render();

      const cleanId = extractSheetId(id);

      window.handleGoogleSheetData = function(response) {
        clearTimeout(state.timeoutId);

        try {
          if (response.status === 'error') {
            const errMsg = response.errors && response.errors[0] ? response.errors[0].detailed_message : '';
            throw new Error(errMsg.includes('Access denied') ? '던전 입구가 봉인되어 있습니다. (시트 공유 권한을 "링크가 있는 모든 사용자"로 변경하세요)' : `마법진 오류: ${errMsg}`);
          }

          const rows = response.table.rows;
          if (!rows || rows.length === 0) throw new Error('던전에 몬스터(문제)가 없습니다.');

          const parsedQuestions = [];
          
          for (let i = 0; i < rows.length; i++) {
            const row = rows[i];
            if (!row || !row.c || row.c[0] === null || row.c[0].v === null || row.c[0].v === undefined) continue;
            if (row.c[0].v === '문제') continue;

            parsedQuestions.push({
              question: String(row.c[0].v),
              options: [
                row.c[1] && row.c[1].v !== null && row.c[1].v !== undefined ? String(row.c[1].v) : '',
                row.c[2] && row.c[2].v !== null && row.c[2].v !== undefined ? String(row.c[2].v) : '',
                row.c[3] && row.c[3].v !== null && row.c[3].v !== undefined ? String(row.c[3].v) : '',
                row.c[4] && row.c[4].v !== null && row.c[4].v !== undefined ? String(row.c[4].v) : ''
              ],
              answerIndex: row.c[5] && row.c[5].v !== null && row.c[5].v !== undefined ? parseInt(row.c[5].v) - 1 : 0
            });
          }

          if (parsedQuestions.length === 0) throw new Error('던전에 유효한 몬스터(문제)가 없습니다.');

          state.questions = parsedQuestions;
          state.hp = 3;
          state.level = 1;
          state.exp = 0;
          state.score = 0;
          state.currentQuestionIndex = 0;
          state.logs = ["던전에 입장했습니다.", "어둠 속에서 무언가 다가옵니다..."];
          state.appState = 'playing';

        } catch (error) {
          state.errorMessage = error.message || '데이터를 불러오지 못했습니다.';
          state.appState = 'error';
        }
        render();
      };

      state.timeoutId = setTimeout(() => {
        state.errorMessage = '마나(인터넷)가 부족하여 소환에 실패했습니다. 인터넷 연결이나 시트 주소를 확인하세요.';
        state.appState = 'error';
        render();
      }, 10000);

      const oldScript = document.getElementById('gviz-script');
      if (oldScript) oldScript.remove();

      const script = document.createElement('script');
      script.id = 'gviz-script';
      script.src = `https://docs.google.com/spreadsheets/d/${cleanId}/gviz/tq?tqx=out:json;responseHandler:handleGoogleSheetData`;
      document.body.appendChild(script);
    }

    function getInputValue() {
      const inputEl = document.getElementById('sheet-input');
      return inputEl ? inputEl.value : state.sheetId;
    }

    function startTeacher() {
      const inputValue = getInputValue();
      if (!inputValue || !inputValue.trim()) {
        return alert('던전(구글 시트) 주소를 입력해주세요!');
      }
      state.sheetId = extractSheetId(inputValue);
      fetchQuizData(state.sheetId);
    }

    function showQRCode() {
      const inputValue = getInputValue();

      if (!inputValue || !inputValue.trim()) {
        return alert('먼저 던전 주소를 입력해주세요!');
      }
      
      const cleanId = extractSheetId(inputValue);
      state.sheetId = cleanId; 
      
      let baseShareUrl = rawAppUrl;
      if (baseShareUrl.includes("<?")) {
        baseShareUrl = window.location.origin + window.location.pathname;
      }
      
      const shareUrl = baseShareUrl + "?sheetId=" + cleanId;
      state.qrUrl = shareUrl; // QR 코드를 띄울 URL 저장
      render(); // 화면 갱신하여 팝업 띄우기
    }

    function closeQRCode() {
      state.qrUrl = ''; // QR 코드 초기화하여 팝업 닫기
      render();
    }

    function copyClipboard(url) {
      const textArea = document.createElement("textarea");
      textArea.value = url;
      document.body.appendChild(textArea);
      textArea.select();
      
      try {
        document.execCommand('copy');
        alert('링크가 성공적으로 복사되었습니다!');
      } catch (err) {
        alert('복사에 실패했습니다.');
      }
      document.body.removeChild(textArea);
    }

    function selectAnswer(index) {
      if (state.isAnswerChecked) return;
      state.selectedAnswer = index;
      state.isAnswerChecked = true;
      
      const currentQ = state.questions[state.currentQuestionIndex];
      const isCorrect = (index === currentQ.answerIndex);
      
      const monsterName = MONSTERS[state.currentQuestionIndex % MONSTERS.length];

      if (isCorrect) {
        state.score += 1;
        state.exp += 35;
        state.monsterHit = true;
        addLog(`[정답] ⚔️ 치명타! ${monsterName}에게 피해를 입혔다!`);
        
        if (state.exp >= 100) {
          state.level += 1;
          state.exp -= 100;
          addLog(`🌟 레벨업! LV.${state.level}이(가) 되었습니다!`);
        }
      } else {
        state.hp -= 1;
        state.shakeScreen = true; 
        addLog(`[오답] 🩸 앗! ${monsterName}의 공격에 당했습니다!`);
      }

      render();

      setTimeout(() => {
        state.shakeScreen = false;
        state.monsterHit = false;
        
        if (state.hp <= 0) {
          state.appState = 'gameover';
        } else if (state.currentQuestionIndex < state.questions.length - 1) {
          state.currentQuestionIndex += 1;
          state.selectedAnswer = null;
          state.isAnswerChecked = false;
          addLog(`야생의 ${MONSTERS[state.currentQuestionIndex % MONSTERS.length]}이(가) 나타났다!`);
        } else {
          state.appState = 'result';
        }
        render();
      }, 1500);
    }

    function resetQuiz() {
      state.hp = 3;
      state.level = 1;
      state.exp = 0;
      state.currentQuestionIndex = 0;
      state.score = 0;
      state.selectedAnswer = null;
      state.isAnswerChecked = false;
      state.logs = ["던전에 다시 입장했습니다.", "새로운 마음가짐으로 출발합니다!"];
      state.appState = 'playing';
      render();
    }

    function goSetup() {
      state.appState = 'setup';
      render();
    }

    function render() {
      const app = document.getElementById('app');
      let html = '';

      if (state.appState === 'loading') {
        html = `
          <i data-lucide="loader-2" class="w-16 h-16 text-yellow-400 animate-spin mb-6"></i>
          <h2 class="text-2xl text-yellow-400">마법진을 통해 데이터를 소환 중...</h2>
        `;
        app.className = "min-h-screen flex flex-col items-center justify-center p-4 bg-slate-900";
      } 
      
      else if (state.appState === 'error') {
        html = `
          <div class="retro-box bg-slate-800 p-8 max-w-md w-full text-center">
            <i data-lucide="skull" class="w-20 h-20 text-red-500 mx-auto mb-6"></i>
            <h2 class="text-3xl text-red-400 mb-4">입장 실패</h2>
            <p class="text-slate-300 mb-8 leading-relaxed">${state.errorMessage}</p>
            <button onclick="goSetup()" class="w-full py-4 bg-slate-700 hover:bg-slate-600 border-2 border-white text-white text-xl transition-colors">
              마을로 돌아가기
            </button>
          </div>
        `;
        app.className = "min-h-screen flex flex-col items-center justify-center p-4 bg-slate-900";
      }

      else if (state.appState === 'setup') {
        html = `
          <div class="retro-box bg-slate-800 p-8 md:p-12 max-w-lg w-full relative">
            <div class="flex items-center justify-center mb-8 text-yellow-400">
              <i data-lucide="swords" class="w-12 h-12 mr-4"></i>
              <h1 class="text-3xl md:text-4xl">던전 퀴즈 마스터</h1>
            </div>
            
            <div class="space-y-6 text-slate-300">
              <div class="bg-slate-900 p-5 border-2 border-slate-600 text-sm">
                <p class="text-yellow-400 mb-3 text-lg">[ 길드 안내소 ]</p>
                <ol class="list-decimal pl-5 space-y-2 leading-relaxed">
                  <li>시트공유권한을 <b>'링크가 있는 모든 사용자'</b>로 변경</li>
                  <li>아래에 시트 전체 주소를 넣고 던전을 생성</li>                  
                </ol>
              </div>

              <div>
                <label class="block text-lg text-yellow-400 mb-2">던전 지도 (구글 시트 링크)</label>
                <input 
                  id="sheet-input"
                  type="text" 
                  value="${state.sheetId}"
                  placeholder="구글 시트 전체 링크를 붙여넣어라!" 
                  class="w-full px-4 py-4 bg-slate-900 border-2 border-slate-500 text-white outline-none focus:border-yellow-400 transition-colors"
                />
              </div>

              <div class="flex flex-col gap-4 mt-8">
                <button onclick="startTeacher()" class="w-full py-4 bg-red-700 hover:bg-red-600 border-2 border-white text-white text-xl shadow-[4px_4px_0px_#000] active:translate-y-1 active:shadow-[0px_0px_0px_#000] transition-all">
                  > 던전 입장하기
                </button>
                
                <button onclick="showQRCode()" class="w-full py-4 bg-blue-800 hover:bg-blue-700 border-2 border-white text-white text-xl shadow-[4px_4px_0px_#000] active:translate-y-1 active:shadow-[0px_0px_0px_#000] transition-all flex items-center justify-center">
                  <i data-lucide="qr-code" class="w-6 h-6 mr-3"></i>
                  > 소환 마법진 (QR 코드 생성)
                </button>
              </div>
            </div>
          </div>
        `;

        // QR 코드가 생성되었다면 화면을 덮는 모달(팝업) 창을 추가합니다.
        if (state.qrUrl) {
          html += `
            <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
              <div class="retro-box bg-slate-800 p-8 text-center max-w-sm w-full animate-float">
                <h2 class="text-2xl text-yellow-400 mb-6 font-bold">소환 마법진</h2>
                <p class="text-slate-300 text-sm mb-4">학생들이 기기로 아래 코드를 스캔하세요!</p>
                
                <!-- QR 코드가 그려질 흰색 영역 -->
                <div class="bg-white p-4 mx-auto w-fit mb-6 shadow-xl" id="qr-container"></div>
                
                <div class="flex gap-3 mt-6">
                  <button onclick="copyClipboard('${state.qrUrl}')" class="flex-1 py-3 bg-blue-700 hover:bg-blue-600 border-2 border-white text-white text-sm shadow-[2px_2px_0px_#000] active:translate-y-1 active:shadow-[0px_0px_0px_#000]">
                    > 링크 복사
                  </button>
                  <button onclick="closeQRCode()" class="flex-1 py-3 bg-slate-600 hover:bg-slate-500 border-2 border-white text-white text-sm shadow-[2px_2px_0px_#000] active:translate-y-1 active:shadow-[0px_0px_0px_#000]">
                    > 창 닫기
                  </button>
                </div>
              </div>
            </div>
          `;
        }
        
        app.className = "min-h-screen flex items-center justify-center p-4 bg-slate-900";
      }

      else if (state.appState === 'playing') {
        const currentQ = state.questions[state.currentQuestionIndex];
        const monsterName = MONSTERS[state.currentQuestionIndex % MONSTERS.length];
        const monsterEmoji = MONSTER_EMOJIS[state.currentQuestionIndex % MONSTER_EMOJIS.length];
        const progressStr = `${state.currentQuestionIndex + 1} / ${state.questions.length}`;

        let heartsHtml = '';
        for(let i=0; i<state.maxHp; i++) {
          if (i < state.hp) heartsHtml += `<i data-lucide="heart" class="w-6 h-6 inline-block text-red-500 fill-red-500 mr-1"></i>`;
          else heartsHtml += `<i data-lucide="heart" class="w-6 h-6 inline-block text-slate-600 mr-1"></i>`;
        }

        let optionsHtml = '';
        currentQ.options.forEach((option, idx) => {
          if (!option) return; 
          
          let buttonStyle = "bg-slate-800 border-slate-500 text-slate-300 hover:bg-slate-700 hover:border-white";
          let prefix = `[${idx+1}] 공격:`;
          
          if (state.isAnswerChecked) {
            if (idx === currentQ.answerIndex) {
              buttonStyle = "bg-green-900 border-green-400 text-green-300"; 
              prefix = `[★] 적중:`;
            } else if (idx === state.selectedAnswer) {
              buttonStyle = "bg-red-900 border-red-500 text-red-300"; 
              prefix = `[X] 빗나감:`;
            } else {
              buttonStyle = "opacity-40 bg-slate-900 border-slate-700"; 
            }
          }

          optionsHtml += `
            <button
              onclick="selectAnswer(${idx})"
              ${state.isAnswerChecked ? 'disabled' : ''}
              class="w-full text-left px-4 py-4 md:py-5 border-2 transition-all text-lg md:text-xl ${buttonStyle}"
            >
              <span class="text-yellow-500 mr-2">${prefix}</span>
              ${option}
            </button>
          `;
        });

        const screenClass = state.shakeScreen ? 'animate-shake' : '';
        const monsterClass = state.monsterHit ? 'opacity-20 scale-90 transition-all duration-200 text-red-500' : 'animate-float';

        html = `
          <div class="w-full max-w-2xl py-6 flex flex-col min-h-screen ${screenClass}">
            
            <div class="retro-box bg-slate-800 p-4 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
              <div class="flex items-center">
                <span class="text-yellow-400 mr-3 text-lg">HP</span>
                ${heartsHtml}
              </div>
              <div class="flex-1 w-full md:w-auto md:ml-6">
                <div class="flex justify-between text-sm mb-1 text-slate-300">
                  <span>LV.${state.level} 용사</span>
                  <span>EXP ${state.exp}/100</span>
                </div>
                <div class="w-full bg-slate-900 border-2 border-slate-600 h-4">
                  <div class="bg-blue-500 h-full transition-all duration-300" style="width: ${state.exp}%"></div>
                </div>
              </div>
              <div class="text-slate-400 text-sm whitespace-nowrap">층수: ${progressStr}</div>
            </div>

            <div class="flex-1 flex flex-col items-center justify-center mb-6 px-4">
              <div class="mb-8 ${monsterClass} text-[100px] md:text-[140px] drop-shadow-[0_0_20px_rgba(255,0,0,0.6)] leading-none select-none cursor-default">
                ${monsterEmoji}
              </div>
              
              <div class="retro-box bg-black w-full p-6 md:p-8 relative">
                <div class="absolute -top-4 left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-[10px] border-r-[10px] border-b-[16px] border-l-transparent border-r-transparent border-b-white"></div>
                <p class="text-yellow-300 text-sm mb-2">야생의 ${monsterName}이(가) 질문을 던졌다!</p>
                <h2 class="text-xl md:text-2xl leading-relaxed">"${currentQ.question}"</h2>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
              ${optionsHtml}
            </div>

            <div class="retro-box bg-black p-4 h-32 flex flex-col justify-end overflow-hidden">
              ${state.logs.map((log, i) => `
                <p class="text-slate-300 text-sm md:text-base leading-loose ${i === state.logs.length-1 ? 'text-white font-bold' : 'opacity-70'}">> ${log}</p>
              `).join('')}
            </div>

          </div>
        `;
        app.className = "min-h-screen flex flex-col items-center p-4 bg-slate-900";
      }

      else if (state.appState === 'gameover') {
        html = `
          <div class="text-center w-full max-w-lg">
            <i data-lucide="skull" class="w-32 h-32 text-red-600 mx-auto mb-8 animate-pulse"></i>
            <h1 class="text-5xl text-red-600 mb-6 font-bold tracking-widest">GAME OVER</h1>
            <p class="text-xl text-slate-400 mb-12">눈앞이 깜깜해졌다... 용사는 쓰러졌습니다.</p>
            
            <div class="retro-box bg-slate-800 p-6 mb-8 text-left inline-block w-full">
              <p class="text-slate-300 mb-2">> 도달한 층수 : <span class="text-white">${state.currentQuestionIndex + 1}층</span></p>
              <p class="text-slate-300">> 최종 레벨 : <span class="text-blue-400">LV.${state.level}</span></p>
            </div>

            <button 
              onclick="resetQuiz()"
              class="w-full py-5 bg-slate-800 hover:bg-slate-700 border-4 border-white text-white text-2xl transition-all shadow-[6px_6px_0px_#000] active:translate-y-1 active:shadow-[0px_0px_0px_#000]"
            >
              > 마을에서 부활하기
            </button>
          </div>
        `;
        app.className = "min-h-screen flex items-center justify-center p-4 bg-black";
      }

      else if (state.appState === 'result') {
        const isPerfect = state.hp === state.maxHp;
        const rank = isPerfect ? 'SSS급 전설의 용사' : (state.hp === 2 ? 'A급 정예 용사' : 'B급 모험가');
        
        html = `
          <div class="text-center w-full max-w-lg retro-box bg-slate-800 p-8 md:p-12">
            <div class="mb-8 relative">
              <div class="absolute inset-0 bg-yellow-500 blur-3xl opacity-20 rounded-full animate-pulse"></div>
              <i data-lucide="crown" class="w-32 h-32 text-yellow-400 mx-auto relative z-10 animate-float"></i>
            </div>
            
            <h1 class="text-4xl text-yellow-400 mb-4">던전 클리어!</h1>
            <p class="text-lg text-slate-300 mb-8">모든 마물(문제)을 물리치고 평화를 되찾았습니다.</p>
            
            <div class="bg-black border-2 border-slate-600 p-6 mb-8 text-left">
              <p class="text-slate-400 mb-3">> 획득한 칭호 : <span class="text-yellow-400 text-xl block mt-1">${rank}</span></p>
              <p class="text-slate-400 mb-3">> 최종 레벨 : <span class="text-blue-400 text-xl">LV.${state.level}</span></p>
              <p class="text-slate-400">> 남은 생명력 : <span class="text-red-500 text-xl">${'❤️'.repeat(state.hp)}</span></p>
            </div>

            <button 
              onclick="resetQuiz()"
              class="w-full py-5 bg-blue-900 hover:bg-blue-800 border-2 border-white text-white text-xl transition-all shadow-[4px_4px_0px_#000] active:translate-y-1 active:shadow-[0px_0px_0px_#000]"
            >
              > 다음 던전으로 (다시하기)
            </button>
          </div>
        `;
        app.className = "min-h-screen flex items-center justify-center p-4 bg-slate-900";
      }

      // 화면에 HTML 밀어넣기
      app.innerHTML = html;
      
      // QR 코드가 그려질 공간이 있다면 qrcode.js 라이브러리를 통해 QR 이미지 생성!
      if (state.qrUrl && document.getElementById('qr-container')) {
        document.getElementById('qr-container').innerHTML = '';
        new QRCode(document.getElementById('qr-container'), {
          text: state.qrUrl,
          width: 200,
          height: 200,
          colorDark : "#000000",
          colorLight : "#ffffff",
          correctLevel : QRCode.CorrectLevel.H
        });
      }
      
      try {
        if (typeof lucide !== 'undefined') lucide.createIcons();
      } catch (e) {
        console.error("아이콘 로딩 실패", e);
      }
    }
  </script>
</body>
</html>
